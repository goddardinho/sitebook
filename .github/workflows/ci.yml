name: CI/CD Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze --no-fatal-infos

      - name: Check for unused dependencies
        run: flutter pub deps --json | jq '.packages[] | select(.kind == "direct") | select(.dependencies | length == 0) | .name' || true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test --coverage --reporter=expanded

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: sitebook-coverage
          fail_ci_if_error: false

  integration_test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          script: flutter test integration_test/ --timeout=10m

  security_audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run security audit
        continue-on-error: true
        run: |
          # Check for known vulnerabilities in dependencies
          flutter pub deps --json | jq -r '.packages[].name' > deps.txt
          echo "Checking dependencies for known vulnerabilities..."
          # This is a placeholder - in practice you'd use tools like:
          # - snyk test
          # - OWASP dependency-check
          # - Custom security scanning tools

      - name: Verify secure build scripts
        run: |
          if [ -f "scripts/build_secure.sh" ]; then
            echo "✅ Secure build script found"
            bash -n scripts/build_secure.sh  # Syntax check
          fi
          if [ -f "scripts/run_secure.sh" ]; then
            echo "✅ Secure run script found"
            bash -n scripts/run_secure.sh  # Syntax check
          fi

  quality_gate:
    name: Quality Gate
    needs: [analyze, test, integration_test, security_audit]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check quality gate
        run: |
          if [[ "${{ needs.analyze.result }}" != "success" ]]; then
            echo "❌ Static analysis failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          if [[ "${{ needs.integration_test.result }}" != "success" ]]; then
            echo "⚠️ Integration tests failed (non-blocking)"
          fi
          if [[ "${{ needs.security_audit.result }}" != "success" ]]; then
            echo "⚠️ Security audit failed (non-blocking)"
          fi
          echo "✅ Quality gate completed!"
