name: CI/CD Pipeline (Minimal - Quality Checks Temporarily Disabled)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify app builds
        run: flutter build apk --debug

  analyze:
    name: Static Analysis (Non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true  # Don't fail the pipeline
    steps:
      - uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed . || echo "Formatting issues found (non-blocking)"

      - name: Analyze project source
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || echo "Analyzer issues found (non-blocking)"

