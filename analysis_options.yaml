# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"
    - "**/main_broken.dart"
    - build/**
  errors:
    # Treat certain lints as errors to enforce stricter code quality
    invalid_annotation_target: error
    # Note: unused_import, unused_local_variable, dead_code are analysis
    # issues automatically detected by Dart analyzer, not configurable lints

linter:
  # Enhanced lint rules for better code quality and error prevention
  rules:
    # Error Prevention
    avoid_print: true  # Enable in production, use debugPrint instead

    # Code Quality
    prefer_single_quotes: true
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    avoid_unnecessary_containers: true
    avoid_redundant_argument_values: true

    # Safety
    avoid_dynamic_calls: true
    avoid_empty_else: true
    avoid_relative_lib_imports: true
    cancel_subscriptions: true
    close_sinks: true

    # Documentation
    public_member_api_docs: false  # Too verbose for this project
    lines_longer_than_80_chars: false  # Modern screens can handle longer lines

    # Flutter Specific
    use_key_in_widget_constructors: true
    prefer_const_constructors_in_immutables: true
    avoid_web_libraries_in_flutter: true

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
